<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMate | Campus Navigator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="navigator.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="pro-theme">
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass">
            <div class="sidebar-header">
                <div class="logo-area">
                    <div class="logo-icon"><i data-lucide="wallet"></i></div>
                    <h2>Uni<span>Mate</span></h2>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn" onclick="window.location.href='index.html#overview'">
                    <i data-lucide="layout-grid"></i>
                    <span>Home</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='index.html#budget'">
                    <i data-lucide="target"></i>
                    <span>Budgeting</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='index.html#assignment'">
                    <i data-lucide="book-check"></i>
                    <span>Assignments</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='index.html#timer'">
                    <i data-lucide="timer"></i>
                    <span>Timer</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='index.html#gpa'">
                    <i data-lucide="calculator"></i>
                    <span>GPA Calculator</span>
                </button>
                <button class="nav-btn active">
                    <i data-lucide="map-pin"></i>
                    <span>Navigator</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='splitter.html'">
                    <i data-lucide="users"></i>
                    <span>Budget Splitter</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='food.html'">
                    <i data-lucide="utensils"></i>
                    <span>Food Finder</span>
                </button>
                <button class="nav-btn" id="logout-btn" type="button">
                    <i data-lucide="log-out"></i>
                    <span>Logout</span>
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="content-area">
            <!-- Header Section -->
            <header class="content-header">
                <div class="header-right">
                    <div class="user-profile glass">
                        <div class="avatar"><i data-lucide="user"></i></div>
                        <span>Student Pro</span>
                    </div>
                </div>
            </header>

            <section id="navigator-section" class="view active">
                <div class="navigator-header animate-on-load">
                    <h1>Campus Navigator</h1>
                    <p class="subtitle">Find your way around the university with ease.</p>
                </div>

                <!-- Search and Map Controls -->
                <div class="nav-controls animate-on-load" style="--delay: 0.1s">
                    <div class="search-bar-container glass">
                        <i data-lucide="search"></i>
                        <input type="text" id="place-search" placeholder="Search for a place, hall, or lab...">
                    </div>
                    <button class="btn-vle glass" id="open-floor-map">
                        <i data-lucide="map"></i>
                        <span>The Floor Map</span>
                    </button>
                </div>

                <!-- Categories -->
                <div class="category-tabs animate-on-load" style="--delay: 0.2s">
                    <button class="cat-tab active" data-category="all">All</button>
                    <button class="cat-tab" data-category="study areas">Study Areas</button>
                    <button class="cat-tab" data-category="lecture halls">Lecture Halls</button>
                    <button class="cat-tab" data-category="auditoriums">Auditoriums</button>
                    <button class="cat-tab" data-category="labs">Labs</button>
                    <button class="cat-tab" data-category="libraries">Libraries</button>
                    <button class="cat-tab" data-category="washrooms">Washrooms</button>
                </div>

                <!-- Cards Grid -->
                <div id="places-grid" class="places-grid animate-on-load" style="--delay: 0.3s">
                    <!-- Cards will be populated by navigator.js -->
                </div>
            </section>
        </main>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal">
        <div class="modal-content glass">
            <span class="close-modal">&times;</span>
            <div id="modal-body">
                <!-- Content populated by navigator.js -->
            </div>
        </div>
    </div>

    <script src="navigator.js"></script>
    <script>
        lucide.createIcons();
        // Setup logout for navigator page as well
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('authUser');
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
