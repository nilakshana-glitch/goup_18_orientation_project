<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMate | Food Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="food.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="pro-theme">
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass">
            <div class="sidebar-header">
                <div class="logo-area">
                    <div class="logo-icon"><i data-lucide="wallet"></i></div>
                    <h2>Uni<span>Mate</span></h2>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn" onclick="window.location.href='index.html#overview'">
                    <i data-lucide="layout-grid"></i>
                    <span>Home</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='index.html#budget'">
                    <i data-lucide="target"></i>
                    <span>Budgeting</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='index.html#assignment'">
                    <i data-lucide="book-check"></i>
                    <span>Assignments</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='index.html#timer'">
                    <i data-lucide="timer"></i>
                    <span>Timer</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='index.html#gpa'">
                    <i data-lucide="calculator"></i>
                    <span>GPA Calculator</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='events.html'">
                    <i data-lucide="calendar"></i>
                    <span>Event Reminder</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='navigator.html'">
                    <i data-lucide="map-pin"></i>
                    <span>Navigator</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='splitter.html'">
                    <i data-lucide="users"></i>
                    <span>Budget Splitter</span>
                </button>
                <button class="nav-btn active">
                    <i data-lucide="utensils"></i>
                    <span>Food Finder</span>
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="content-area">
            <!-- Header Section -->
            <header class="content-header">
                <div class="header-right">
                    <div class="user-profile glass">
                        <div class="avatar"><i data-lucide="user"></i></div>
                        <span>Student Pro</span>
                    </div>
                    <button id="logout-btn" class="glass" type="button">
                        <i data-lucide="log-out"></i>
                        <span>Logout</span>
                    </button>
                </div>
            </header>

            <section id="food-section" class="view active">
                <div class="food-header animate-on-load">
                    <h1>Food Finder</h1>
                    <p class="subtitle">Satisfy your hunger. Browse menus before you walk.</p>
                </div>

                <!-- Search and Filters -->
                <div class="food-controls animate-on-load" style="--delay: 0.1s">
                    <div class="search-bar-container glass">
                        <i data-lucide="search"></i>
                        <input type="text" id="food-search" placeholder="Search for food, canteens, or juice bars...">
                    </div>
                </div>

                <div class="category-tabs animate-on-load" style="--delay: 0.2s">
                    <button class="food-cat-tab active" data-category="all">All Spots</button>
                    <button class="food-cat-tab" data-category="canteen">Canteens</button>
                    <button class="food-cat-tab" data-category="food court">Food Court</button>
                    <button class="food-cat-tab" data-category="juice bar">Juice Bars</button>
                    <button class="food-cat-tab" data-category="cafe">Cafes</button>
                </div>

                <!-- Food Spots Grid -->
                <div id="food-spots-grid" class="food-grid animate-on-load" style="--delay: 0.3s">
                    <!-- Food spot cards populated by food.js -->
                </div>
            </section>
        </main>
    </div>

    <!-- Menu Modal -->
    <div id="menu-modal" class="modal">
        <div class="modal-content glass">
            <span class="close-modal">&times;</span>
            <div id="menu-modal-body">
                <!-- Menu content populated by food.js -->
            </div>
        </div>
    </div>

    <script src="food.js"></script>
    <script>
        lucide.createIcons();
        // Logout logic
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('authUser');
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
