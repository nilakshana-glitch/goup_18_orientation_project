<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMate | Bill Splitter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="splitter.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="pro-theme">
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass">
            <div class="sidebar-header">
                <div class="logo-area">
                    <img src="images/logo.png" alt="Logo" class="logo-img">
                    <h2>Uni<span>Mate</span></h2>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn" onclick="window.location.href='index.html#overview'">
                    <i data-lucide="layout-grid"></i>
                    <span>Home</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='index.html#budget'">
                    <i data-lucide="target"></i>
                    <span>Budgeting</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='index.html#assignment'">
                    <i data-lucide="book-check"></i>
                    <span>Assignments</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='index.html#timer'">
                    <i data-lucide="timer"></i>
                    <span>Timer</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='index.html#gpa'">
                    <i data-lucide="calculator"></i>
                    <span>GPA Calculator</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='events.html'">
                    <i data-lucide="calendar"></i>
                    <span>Event Reminder</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='navigator.html'">
                    <i data-lucide="map-pin"></i>
                    <span>Navigator</span>
                </button>
                <button class="nav-btn active">
                    <i data-lucide="users"></i>
                    <span>Budget Splitter</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='food.html'">
                    <i data-lucide="utensils"></i>
                    <span>Food Finder</span>
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="content-area">
            <!-- Header Section -->
            <header class="content-header">
                <div class="header-right">
                    <div class="user-profile glass">
                        <div class="avatar"><i data-lucide="user"></i></div>
                        <span>Student Pro</span>
                    </div>
                    <button id="logout-btn" class="glass" type="button">
                        <i data-lucide="log-out"></i>
                        <span>Logout</span>
                    </button>
                </div>
            </header>

            <section id="splitter-section" class="view active">
                <div class="splitter-header animate-on-load">
                    <h1>Bill Splitter</h1>
                    <p class="subtitle">Fair and simple sharing. No more math headaches.</p>
                </div>

                <div class="splitter-grid">
                    <!-- Left: Management -->
                    <div class="splitter-main">
                        <!-- Friend Management -->
                        <div class="glass-section glass animate-on-load" style="--delay: 0.1s">
                            <h3><i data-lucide="user-plus"></i> Manage Friends</h3>
                            <div class="friend-input-group">
                                <input type="text" id="friend-name" placeholder="Friend's Name">
                                <button class="btn btn-primary" id="add-friend-btn">Add Friend</button>
                            </div>
                            <div id="friends-list" class="friends-tags">
                                <!-- Friends tags added here -->
                            </div>
                        </div>

                        <!-- Add Expense -->
                        <div class="glass-section glass animate-on-load" style="--delay: 0.2s; margin-top: 32px;">
                            <h3><i data-lucide="plus-circle"></i> Add an Expense</h3>
                            <form id="expense-split-form">
                                <div class="input-grid">
                                    <div class="input-group">
                                        <label>Description</label>
                                        <input type="text" id="expense-desc" placeholder="Dinner, Movie, Rent..." required>
                                    </div>
                                    <div class="input-group">
                                        <label>Amount (LKR)</label>
                                        <input type="number" id="expense-amount" placeholder="0.00" required step="0.01">
                                    </div>
                                    <div class="input-group">
                                        <label>Who Paid?</label>
                                        <select id="payer-select" required>
                                            <option value="">Select Payer</option>
                                            <option value="You">You</option>
                                            <!-- Friend options populated by JS -->
                                        </select>
                                    </div>
                                </div>

                                <div class="split-with-section">
                                    <label>Split With:</label>
                                    <div id="split-participants" class="participants-checkbox-grid">
                                        <div class="participant-checkbox">
                                            <input type="checkbox" id="split-you" value="You" checked>
                                            <label for="split-you">You</label>
                                        </div>
                                        <!-- Friends checkboxes populated by JS -->
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary">Split Bill</button>
                            </form>
                        </div>
                    </div>

                    <!-- Right: Results -->
                    <div class="splitter-sidebar">
                        <!-- Balances -->
                        <div class="glass-section glass animate-on-load" style="--delay: 0.3s">
                            <h3><i data-lucide="balance-scale"></i> Final Balances</h3>
                            <div id="balances-display" class="balances-list">
                                <p class="empty-message">No balances to show.</p>
                            </div>
                            <button id="clear-data-btn" class="btn btn-secondary" style="margin-top: 20px;">Clear All Data</button>
                        </div>

                        <!-- Recent Splits -->
                        <div class="glass-section glass animate-on-load" style="--delay: 0.4s; margin-top: 32px;">
                            <h3><i data-lucide="history"></i> Recent Splits</h3>
                            <div id="splits-history" class="mini-list">
                                <p class="empty-message">No recent splits.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="splitter.js"></script>
    <script>
        lucide.createIcons();
        // Setup logout for splitter page
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('authUser');
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
